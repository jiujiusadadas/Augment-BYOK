name: Auto build BYOK VSIX

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Analyze upstream
        run: npm run upstream:analyze

      - name: Check patches/contracts
        run: npm run check

      - name: Build VSIX
        run: npm run build:vsix

      - name: Detect artifact
        id: artifact
        run: |
          FILE=$(ls dist/*.vsix | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          BASENAME=$(basename "$FILE" .vsix)
          echo "name=$BASENAME" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.name }}
          name: ${{ steps.artifact.outputs.name }}
          prerelease: true
          files: ${{ steps.artifact.outputs.file }}
